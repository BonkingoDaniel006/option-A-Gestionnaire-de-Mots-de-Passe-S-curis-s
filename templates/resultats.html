<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Résultats de recherche</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>
<body>
    <h1>Résultats pour : "{{ query }}"</h1>

    {% if resultats %}
        <table border="1">
            <thead>
                <tr>
                    <th>Site</th>
                    <th>Mot de passe</th>
                </tr>
            </thead>
            <tbody>
                {% for r in resultats %}
                <tr>
                    <td>{{ r.site }}</td>
                    <td><code>{{ r.mdp }}</code></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>Aucun resultat.</p>
    {% endif %}

    <br>
    <a href="/">Retour à l'accueil</a>
</body>
</html>
